<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #EE352E;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.12) 1.5px, transparent 1.5px);
    background-size: 36px 36px;
    background-position: 18px 18px;
    pointer-events: none;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
  }

  .logo {
    font-weight: 800;
    font-size: 96px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .bubbles {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .bubble {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 42px;
    letter-spacing: 0;
    flex-shrink: 0;
  }

  .bubble-n { background: #FCCC0A; color: #000; }
  .bubble-y { background: #E91E8C; color: #fff; }
  .bubble-c { background: #0039A6; color: #fff; }

  .stat-block {
    text-align: right;
    padding-top: 8px;
  }

  .stat-num {
    font-weight: 800;
    font-size: 56px;
    color: rgba(255,255,255,0.9);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat-lbl {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }

  .bottom {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .tagline {
    font-weight: 800;
    font-size: 40px;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .url {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="top">
    <div>
      <div class="logo">DETOUR</div>
      <div class="bubbles">
        <div class="bubble bubble-n">N</div>
        <div class="bubble bubble-y">Y</div>
        <div class="bubble bubble-c">C</div>
      </div>
    </div>
    <div class="stat-block">
      <div class="stat-num">+90m</div>
      <div class="stat-lbl">vs Direct Route</div>
    </div>
  </div>
  <div class="bottom">
    <div class="tagline">Subway routes for people not in a hurry.</div>
    <div class="url">detour.nyc</div>
  </div>
</body>
</html>
